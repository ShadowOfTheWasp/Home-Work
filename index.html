<!DOCTYPE html>
<html>
<head>
    <title>My Work Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .day { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .today { background-color: #e7f3ff; font-weight: bold; color: #1877f2; border-radius: 5px; }
        input[type="checkbox"] { width: 20px; height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Weekly Tracker</h1>
    <div class="day" id="d1">Monday <input type="checkbox"></div>
    <div class="day" id="d2">Tuesday <input type="checkbox"></div>
    <div class="day" id="d3">Wednesday <input type="checkbox"></div>
    <div class="day" id="d4">Thursday <input type="checkbox"></div>
    <div class="day" id="d5">Friday <input type="checkbox"></div>
    <div class="day" id="d6">Saturday <input type="checkbox"></div>
    <div class="day" id="d0">Sunday <input type="checkbox"></div>
</div>

<script>
    // This part highlights today's day
    const day = new Date().getDay();
    document.getElementById('d' + day).classList.add('today');
</script>

</body>
</html>
