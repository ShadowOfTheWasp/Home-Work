<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker</title>
    <style>
        :root {
            --primary: #4f46e5; /* The purple/blue from your screenshot */
            --bg: #f8fafc;
            --card: #ffffff;
        }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
        }
        .container {
            width: 90%; max-width: 450px;
            background: var(--card); padding: 2rem;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 { font-size: 1.5rem; text-align: center; color: #1e293b; }
        
        .day-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem; margin-bottom: 0.75rem;
            background: #f1f5f9; border-radius: 12px;
            border: 1px solid transparent;
        }
        
        /* The "Today" Highlight from your screenshot */
        .is-today { 
            background: #e0e7ff; 
            border: 2px solid var(--primary); 
            color: var(--primary);
        }

        .day-name { font-weight: 600; }

        /* Making the dropdown look like a clean button */
        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        /* The colors you asked for (Coral, Turquoise, Pink) applied to the buttons/text */
        h1 { color: #FF7F50; } /* Coral */
        .is-today { border-color: #40E0D0; color: #40E0D0; } /* Turquoise */
        select { border-color: #FF69B4; } /* Pink */

    </style>
</head>
<body>

<div class="container">
    <h1>Weekly Progress</h1>
    <div id="week-container">
        <div class="day-row" id="day-1"><span class="day-name">Monday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="day-2"><span class="day-name">Tuesday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="day-3"><span class="day-name">Wednesday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="day-4"><span class="day-name">Thursday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="day-5"><span class="day-name">Friday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="day-6"><span class="day-name">Saturday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="day-0"><span class="day-name">Sunday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
    </div>
</div>

<script>
    const today = new Date().getDay();
    const activeRow = document.getElementById('day-' + today);
    if (activeRow) activeRow.classList.add('is-today');
</script>

</body>
</html>
