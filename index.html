<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Status Tracker</title>
    <style>
        :root {
            --coral: #FF7F50;
            --turquoise: #40E0D0;
            --pink: #FF69B4;
            --bg: #fff5f8;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            padding: 20px; color: #333;
            display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 500px;
            background: white; padding: 2rem;
            border-radius: 20px; 
            border: 3px solid var(--turquoise);
            box-shadow: 10px 10px 0px var(--pink);
        }
        h2 { 
            text-align: center; 
            color: var(--coral); 
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .day-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 10px; border-bottom: 2px solid var(--bg);
        }
        .day-name { font-weight: bold; color: #444; width: 100px; }
        
        select {
            padding: 10px; border-radius: 10px;
            border: 2px solid var(--coral);
            background: white; font-weight: bold;
            color: #333; outline: none; width: 150px;
        }
        select:focus { border-color: var(--pink); }

        /* Today's Special Style */
        .today-highlight { 
            background: #fff0f5; 
            border-radius: 12px;
            border-left: 5px solid var(--turquoise); 
        }

        .footer-note {
            text-align: center; font-size: 0.8rem; color: var(--pink); margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Work Tracker</h2>
    
    <div id="tracker">
        <div class="day-row" id="day-1">
            <span class="day-name">Monday</span>
            <select id="sel-1" onchange="save(1)">
                <option value="">Select...</option>
                <option value="Office">Office</option>
                <option value="Home">Home</option>
                <option value="Leave">Leave</option>
            </select>
        </div>
        <div class="day-row" id="day-2">
            <span class="day-name">Tuesday</span>
            <select id="sel-2" onchange="save(2)">
                <option value="">Select...</option>
                <option value="Office">Office</option>
                <option value="Home">Home</option>
                <option value="Leave">Leave</option>
            </select>
        </div>
        <div class="day-row" id="day-3">
            <span class="day-name">Wednesday</span>
            <select id="sel-3" onchange="save(3)">
                <option value="">Select...</option>
                <option value="Office">Office</option>
                <option value="Home">Home</option>
                <option value="Leave">Leave</option>
            </select>
        </div>
        <div class="day-row" id="day-4">
            <span class="day-name">Thursday</span>
            <select id="sel-4" onchange="save(4)">
                <option value="">Select...</option>
                <option value="Office">Office</option>
                <option value="Home">Home</option>
                <option value="Leave">Leave</option>
            </select>
        </div>
        <div class="day-row" id="day-5">
            <span class="day-name">Friday</span>
            <select id="sel-5" onchange="save(5)">
                <option value="">Select...</option>
                <option value="Office">Office</option>
                <option value="Home">Home</option>
                <option value="Leave">Leave</option>
            </select>
        </div>
        <div class="day-row" id="day-6">
            <span class="day-name">Saturday</span>
            <select id="sel-6" onchange="save(6)">
                <option value="">Select...</option>
                <option value="Office">Office</option>
                <option value="Home">Home</option>
                <option value="Leave">Leave</option>
            </select>
        </div>
        <div class="day-row" id="day-0">
            <span class="day-name">Sunday</span>
            <select id="sel-0" onchange="save(0)">
                <option value="">Select...</option>
                <option value="Office">Office</option>
                <option value="Home">Home</option>
                <option value="Leave">Leave</option>
            </select>
        </div>
    </div>
    <p class="footer-note">Updates automatically saved to this browser.</p>
</div>

<script>
    // Highlight today
    const d = new Date().getDay();
    const row = document.getElementById('day-' + d);
    if(row) row.classList.add('today-highlight');

    // Save functionality
    function save(dayId) {
        const val = document.getElementById('sel-' + dayId).value;
        localStorage.setItem('work-status-' + dayId, val);
    }

    // Load functionality
    window.onload = function() {
        for (let i = 0; i < 7; i++) {
            const savedVal = localStorage.getItem('work-status-' + i);
            if (savedVal) {
                document.getElementById('sel-' + i).value = savedVal;
            }
        }
    };
</script>

</body>
</html>
