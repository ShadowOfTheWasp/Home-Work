<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker</title>
    <style>
        :root {
            --coral: #FF7F50;
            --turquoise: #40E0D0;
            --pink: #FF69B4;
            --bg: #fff5f8;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            padding: 20px; display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 450px;
            background: white; padding: 2rem;
            border-radius: 20px; 
            border: 4px solid var(--turquoise);
            box-shadow: 12px 12px 0px var(--pink);
        }
        h2 { text-align: center; color: var(--coral); text-transform: uppercase; letter-spacing: 2px; }
        
        .day-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 10px; border-bottom: 2px solid #fff0f5;
        }
        .day-name { font-weight: bold; color: #444; width: 100px; }
        
        select {
            padding: 10px; border-radius: 10px;
            border: 2px solid var(--coral);
            background: white; font-weight: bold;
            outline: none; width: 140px;
        }
        
        /* Highlight Today */
        .today-style { background: #e0fffb; border-radius: 12px; border-left: 6px solid var(--turquoise); }
    </style>
</head>
<body>

<div class="container">
    <h2>Work Tracker</h2>
    <div id="tracker">
        <div class="day-row" id="d-1"><span class="day-name">Monday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="d-2"><span class="day-name">Tuesday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="d-3"><span class="day-name">Wednesday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="d-4"><span class="day-name">Thursday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="d-5"><span class="day-name">Friday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="d-6"><span class="day-name">Saturday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
        <div class="day-row" id="d-0"><span class="day-name">Sunday</span><select><option>Select...</option><option>Office</option><option>Home</option><option>Leave</option></select></div>
    </div>
</div>

<script>
    const day = new Date().getDay();
    const active = document.getElementById('d-' + day);
    if(active) active.classList.add('today-style');
</script>

</body>
</html>
